<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta name="author" content="Arkadeepta Roy">
<meta name="copyright" content="Copyright © 2026 Arkadeepta Roy. All Rights Reserved.">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#000000" id="metatheme" />
<title>arka-os // Arkadeepta Roy</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* True terminal dark theme (green phosphor, default) */
    --bg:#000000;
    --bg-panel:#000000;
    --bg-input:#000000;
    --bg-soft:#111111;     /* hovers, chips, suggest pills */
    --bg-active:#1a1a1a;   /* active nav item */
    --green:#4af626;       /* Classic terminal green */
    --green-dim:#1b5e0f;
    --cyan:#4fd2dd;
    --amber:#f2b855;
    --white:#e0e0e0;
    --ink-soft:#cccccc;    /* body prose */
    --ink-softer:#bbbbbb;  /* secondary prose */
    --dim:#757575;
    --dimmer:#424242;
    --line:#333333;        /* Sharp panel borders */
    --ink:#d3ccbc;
    --red:#ff5555;
    --sel:#1b5e0f;
    --scan:0.6;            /* scanline overlay opacity */
    --fs:14px;             /* base type size */
  }

  /* ---------- viewer-selectable phosphors ---------- */
  html[data-theme="amber"]{
    --green:#ffb000; --green-dim:#7a5500; --cyan:#ffd08a; --amber:#ff9e64;
    --sel:#5c3f00;
  }
  html[data-theme="ice"]{
    --green:#56d3f5; --green-dim:#0f4a5e; --cyan:#9ecbff; --amber:#f2b855;
    --sel:#0b3a4a;
  }
  html[data-theme="mono"]{
    --green:#f0f0f0; --green-dim:#5a5a5a; --cyan:#c9c9c9; --amber:#a8a8a8;
    --sel:#3a3a3a;
  }
  html[data-theme="paper"]{
    --bg:#f2efe6; --bg-panel:#f2efe6; --bg-input:#f2efe6;
    --bg-soft:#e7e3d6; --bg-active:#dedac9;
    --green:#1f6f1f; --green-dim:#9fbf9f; --cyan:#0e5e6e; --amber:#9a5b00;
    --white:#1b1b1b; --ink-soft:#33322e; --ink-softer:#4a4a44;
    --dim:#6b675c; --dimmer:#98937f; --line:#c9c4b4; --ink:#33322e;
    --red:#b3261e; --sel:#cfe8c9; --scan:0.10;
  }

  /* ---------- viewer type scaling ---------- */
  html[data-font="small"]{ --fs:13px; }
  html[data-font="large"]{ --fs:16px; }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  @supports (height:100dvh){ html,body{height:100dvh;} }

  body{
    background:var(--bg);
    color:var(--white);
    font-family:'IBM Plex Mono', ui-monospace, 'Cascadia Mono', Menlo, monospace;
    font-size:var(--fs);
    line-height:1.6;
    overflow:hidden;
    -webkit-font-smoothing:none; /* Crisper rendering for terminal look */
    text-rendering:optimizeLegibility;
  }

  ::selection{background:var(--sel);color:var(--white);}

  .os{
    height:100%;
    display:grid;
    grid-template-rows:auto 1fr auto auto;
    max-width:1400px;
    margin:0 auto;
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
    position:relative;
  }

  /* CRT Scanline Overlay (viewer-toggleable via \crt) */
  .os::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
    background-size: 100% 4px;
    pointer-events: none;
    z-index: 100;
    opacity: var(--scan);
  }
  html[data-crt="off"] .os::after{ display:none; }

  /* Motion kill-switch (viewer-toggleable via \motion) */
  html[data-motion="off"] *{ animation:none !important; transition:none !important; }

  /* ---------- generic terminal header (replacing mac chrome) ---------- */
  .chrome{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 12px;
    border-bottom:1px solid var(--line);
    background:var(--bg);
    font-size:13px;color:var(--dim);
  }
  .chrome .path{color:var(--dim);}
  .chrome .path b{color:var(--green);font-weight:600;}
  .chrome .stat{color:var(--dimmer);}

  .blink{animation:blink 1.1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}

  /* Screen Reader Only Utility */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    border: 0;
  }

  /* ---------- body split ---------- */
  .split{display:grid;grid-template-columns:220px 1fr;min-height:0;}

  /* ---------- command guide (tmux pane style) ---------- */
  .guide{
    border-right:1px solid var(--line);
    padding:12px 0;
    background:var(--bg);
    overflow-y:auto;
  }
  .guide h2{
    font-size:12px;font-weight:600;letter-spacing:.05em;color:var(--dim);
    padding:0 18px;margin-bottom:8px;text-transform:uppercase;
  }
  .cmdlist{list-style:none;}
  .cmd{
    display:block;padding:6px 18px;cursor:pointer;
    border-left:2px solid transparent;
    transition:none; /* True terminal feel lacks transition smoothing */
  }
  .cmd .kline{font-size:var(--fs);white-space:nowrap;}
  .cmd .slash{color:var(--dim);}
  .cmd .k{color:var(--white);}
  .cmd .desc{display:block;color:var(--dim);font-size:12px;margin-top:2px;}

  .cmd:hover,.cmd:focus-visible{background:var(--bg-soft);outline:none;}
  .cmd:hover .k{color:var(--green);}

  .cmd.active{background:var(--bg-active);border-left-color:var(--green);}
  .cmd.active .k{color:var(--green);font-weight:600;}
  .cmd.active .slash{color:var(--green);}

  .guide .foot{padding:12px 18px 0;color:var(--dimmer);font-size:12px;border-top:1px dashed var(--line);margin-top:12px;}

  /* ---------- output ---------- */
  .screen{position:relative;min-height:0;overflow-y:auto;padding:24px 34px 40px 30px;}

  /* Blocky terminal scrollbars */
  .screen::-webkit-scrollbar,.guide::-webkit-scrollbar{width:12px;}
  .screen::-webkit-scrollbar-thumb,.guide::-webkit-scrollbar-thumb{background:var(--line);border:2px solid var(--bg);}
  .screen::-webkit-scrollbar-track{background:var(--bg);}

  .echo{color:var(--dim);font-size:var(--fs);margin-bottom:20px;}
  .echo .p{color:var(--green);}
  .echo .c{color:var(--white);}

  .ln{opacity:1;}
  .reveal .ln{opacity:0;transform:translateY(4px);animation:rise .2s ease-out forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}

  /* standard green ASCII */
  .asciiname{
    display:inline-block;font-weight:600;font-size:14px;line-height:1.15;
    white-space:pre;margin-bottom:14px;
    color:var(--green);
    min-height: 4.6em;
  }

  /* typed tagline under the ASCII */
  .typeline{color:var(--cyan);font-size:var(--fs);margin:0 0 22px;min-height:1.7em;}
  .typeline .pfx{color:var(--green);}
  .typeline .tc{color:var(--green);}

  h1.head, h2.head{font-size:20px;font-weight:600;letter-spacing:0;color:var(--white);margin:2px 0 8px;}
  .kicker{color:var(--cyan);font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;}
  .lead{max-width:70ch;color:var(--ink-soft);margin-bottom:16px;font-size:var(--fs);}
  .lead b{color:var(--white);font-weight:600;}
  .lead .g{color:var(--green);} .lead .a{color:var(--amber);} .lead .c2{color:var(--cyan);}

  .sep{color:var(--line);white-space:pre;overflow:hidden;user-select:none;margin:24px 0;font-size:13px;}

  .kv{display:grid;grid-template-columns:150px 1fr;gap:4px 20px;max-width:72ch;margin:8px 0 12px;}
  .kv dt{color:var(--dim);}
  .kv dd{color:var(--white);}

  ul.term{list-style:none;max-width:74ch;margin:8px 0 16px;}
  ul.term li{position:relative;padding-left:22px;margin:6px 0;color:var(--ink-soft);}
  ul.term li::before{content:"*";position:absolute;left:4px;color:var(--green);}
  ul.term li b{color:var(--white);font-weight:600;}
  ul.term li .a{color:var(--amber);} ul.term li .c2{color:var(--cyan);}

  .rec{border-left:2px solid var(--line);padding:2px 0 2px 18px;margin:0 0 24px;max-width:80ch;}
  .rec .top{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:4px;}
  .rec .role{color:var(--white);font-weight:600;font-size:15px;}
  .rec .org{color:var(--cyan);}
  .rec .when{color:var(--dim);font-size:13px;margin-left:auto;white-space:nowrap;}
  .rec .place{color:var(--dimmer);font-size:13px;margin-bottom:8px;}

  .stats{display:flex;flex-wrap:wrap;gap:32px;margin:16px 0 24px;}
  .stat-b{min-width:96px;}
  .stat-b .n{font-size:28px;font-weight:600;color:var(--green);line-height:1;}
  .stat-b .l{font-size:12px;color:var(--dim);margin-top:6px;text-transform:lowercase;}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 12px;max-width:76ch;}
  .chip{background:var(--bg-soft);border:1px solid var(--line);padding:4px 10px;font-size:13px;color:var(--ink-softer);}
  .chip:hover{border-color:var(--green);color:var(--green);background:var(--bg);}

  /* Reduced status badge */
  .status{font-size:9px;letter-spacing:.05em;padding:1px 6px;border:1px solid;display:inline-block;vertical-align:middle;border-radius:2px;}
  .status.live{color:var(--bg);background:var(--green);border-color:var(--green);font-weight:600;}
  .status.alpha{color:var(--amber);border-color:var(--amber);}

  a.link{color:var(--cyan);text-decoration:none;border-bottom:1px solid transparent;transition:none;}
  a.link:hover{color:var(--bg);background:var(--cyan);}

  .note{color:var(--dim);font-size:13px;max-width:70ch;margin-top:8px;}
  .endcap{margin-top:32px;color:var(--dim);font-size:var(--fs);}
  .endcap .p{color:var(--green);}

  /* configurable-terminal tip box (hero) */
  .tipbox{border:1px dashed var(--green-dim);padding:14px 18px;margin:8px 0 8px;max-width:76ch;}
  .tipbox .th{color:var(--green);font-weight:600;margin-bottom:8px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;}
  .tipbox .row{margin:5px 0;font-size:var(--fs);color:var(--ink-soft);}
  .tipbox .row .cm{margin-right:6px;}

  /* ---------- settings / control panel ---------- */
  .setgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;max-width:86ch;margin:8px 0 20px;}
  .setcard{border:1px solid var(--line);padding:14px 16px;}
  .setcard .sh{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
  .setcard .usage{color:var(--dimmer);font-size:12px;margin-top:8px;}
  .opt{
    display:inline-block;border:1px solid var(--line);background:var(--bg-soft);
    padding:5px 12px;margin:0 8px 8px 0;font-size:13px;color:var(--ink-softer);
    cursor:pointer;user-select:none;touch-action:manipulation;
  }
  .opt:hover,.opt:focus-visible{border-color:var(--green);color:var(--green);outline:none;}
  .opt.on{border-color:var(--green);color:var(--bg);background:var(--green);font-weight:600;}
  .swatch{display:inline-block;width:10px;height:10px;margin-right:8px;border:1px solid var(--line);vertical-align:baseline;}
  .confirm{color:var(--green);margin-bottom:14px;font-size:var(--fs);}

  /* ---------- input bar & block cursor ---------- */
  .inputbar{display:flex;align-items:center;border-top:1px solid var(--line);
    background:var(--bg);padding:0 16px;position:relative;}
  .inputbar .ps1{color:var(--green);white-space:nowrap;padding-right:12px;font-size:var(--fs);}
  .inputbar .ps1 .u{color:var(--cyan);}
  .inputbar form{flex:1; display:flex; align-items:center; min-width:0;}

  /* Input Wrapper for Custom Cursor */
  .input-wrapper { position: relative; flex: 1; display: flex; align-items: center; }

  .inputbar input{flex:1;background:transparent;border:none;outline:none;
    color:var(--white); font-family:inherit;font-size:var(--fs);padding:16px 0;
    caret-color: transparent; /* Hide native caret */
    z-index: 2; position: relative;}
  .inputbar input::placeholder{color:var(--dimmer);}

  /* The Block Cursor */
  #block-cursor {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 0.6em;
    height: 1.2em;
    background: var(--green);
    z-index: 1; opacity: 0.8;
    pointer-events: none;
  }

  /* Focus States for the Cursor */
  .inputbar input:focus + #block-cursor { animation: blink 1s step-end infinite; }
  .inputbar input:not(:focus) + #block-cursor {
    background: transparent; border: 1px solid var(--green); animation: none; opacity: 0.5;
  }

  #cursor-measurer {
    position: absolute; visibility: hidden; white-space: pre;
    font-family: inherit; font-size: var(--fs); padding: 0; pointer-events: none;
  }

  .inputbar .enter{color:var(--dimmer);font-size:12px;white-space:nowrap;
    padding-left:12px;border:none;background:none;cursor:pointer;font-family:inherit;}
  .inputbar .enter:hover{color:var(--white);}

  .suggest{position:absolute;left:16px;right:16px;bottom:100%;display:flex;flex-wrap:wrap;gap:8px;
    padding:12px 0;background:var(--bg);}
  .suggest:empty{display:none;}
  .suggest .s{border:1px solid var(--line);background:var(--bg-soft);padding:4px 12px;font-size:13px;
    color:var(--ink-softer);cursor:pointer;font-family:inherit;}
  .suggest .s:hover,.suggest .s.sel{border-color:var(--green);color:var(--green);background:var(--bg);}
  .suggest .s .m{color:var(--green);}
  .suggest .s .h{color:var(--dimmer);margin-left:8px;}

  .err{color:var(--red);} .err b{color:var(--amber);font-weight:600;}
  .boot{color:var(--dim);font-size:var(--fs);}
  .boot .ok{color:var(--green);} .boot .warn{color:var(--amber);}

  /* ---------- terminal blocks: tree / table / status ---------- */
  .htitle{color:var(--green);font-size:18px;font-weight:600;margin:4px 0 16px;}
  .col-h{color:var(--dim);font-size:12px;text-transform:uppercase;margin:4px 0 8px;border-bottom:1px dashed var(--line);padding-bottom:4px;}

  .cmdlink{color:var(--green);cursor:pointer;text-decoration:underline;text-decoration-style:dashed;}
  .cmdlink:hover{color:var(--bg);background:var(--green);text-decoration:none;}

  /* ASCII architecture tree */
  .tree{display:grid;grid-template-columns:1fr 1fr;gap:12px 48px;margin:8px 0 16px;}
  .tree pre{white-space:pre;font-size:var(--fs);line-height:1.6;color:var(--ink-soft);margin:0;font-family:inherit;}
  .tree .br{color:var(--dim);}
  .tree .grp{color:var(--cyan);font-weight:600;}
  .tree .root{color:var(--green);font-weight:600;}

  /* process list */
  .proc{border-collapse:collapse;font-size:var(--fs);margin:8px 0 12px;width:100%;max-width:700px;}
  .proc td{padding:4px 16px 4px 0;color:var(--ink-soft);white-space:nowrap;}
  .proc .pid{color:var(--amber);} .proc .run{color:var(--green);} .proc .up{color:var(--dim);}

  /* available commands */
  .avail{display:grid;grid-template-columns:max-content 1fr;gap:6px 24px;margin:8px 0 12px;max-width:80ch;font-size:var(--fs);}
  .avail .d{color:var(--dim);}
  .hintlist{margin:12px 0 8px;font-size:var(--fs);}
  .hintlist div{color:var(--ink-soft);margin:6px 0;}
  .hintlist .gt{color:var(--green);margin-right:8px;font-weight:bold;}

  /* projects table - 4 columns instead of 5 */
  .ptable{display:grid;grid-template-columns:3em minmax(12em,16em) 1fr 8em;gap:0 16px;font-size:var(--fs);margin:12px 0 8px;}
  .ptable .h{color:var(--dim);font-size:12px;text-transform:uppercase;padding-bottom:6px;border-bottom:1px dashed var(--line);}
  .ptable .span{grid-column:1/-1;height:1px;background:var(--line);margin:8px 0;display:none;}
  .ptable .cell{padding:8px 0;align-self:start;}
  .ptable .id{color:var(--amber);} .ptable .nm{color:var(--white);font-weight:600;display:flex;align-items:center;gap:8px;}
  .ptable .ds{color:var(--ink-softer);}

  /* bottom status bar */
  .statusbar{display:flex;align-items:center;border-top:1px solid var(--line);
    background:var(--bg);padding:8px 16px;font-size:12px;color:var(--dim);
    white-space:nowrap;overflow-x:auto;}
  .statusbar .seg{display:flex;gap:8px;align-items:center;}
  .statusbar .div{color:var(--line);padding:0 16px;}
  .statusbar .k{color:var(--dimmer);}
  .statusbar .v{color:var(--green);}
  .statusbar .push{margin-left:auto;padding-left:16px;}

  @supports (padding: env(safe-area-inset-bottom)){
    .statusbar{padding-bottom:calc(8px + env(safe-area-inset-bottom));}
  }

  @media (max-width:760px){
    html{ --fs:13px; }
    html[data-font="small"]{ --fs:12px; }
    html[data-font="large"]{ --fs:15px; }
    .split{grid-template-columns:1fr;}
    .guide{border-right:none;border-bottom:1px solid var(--line);padding:8px 0;display:flex;overflow-x:auto;gap:4px;align-items:center;-webkit-overflow-scrolling:touch;}
    .guide::-webkit-scrollbar{display:none;}
    .guide h2,.guide .foot{display:none;}
    .cmdlist{display:flex;gap:6px;padding:0 10px;}
    .cmd{border-left:none;border-bottom:2px solid transparent;padding:10px 14px;background:var(--bg-soft);touch-action:manipulation;}
    .cmd.active{border-bottom-color:var(--green);background:var(--bg-active);}
    .cmd .desc{display:none;}
    .screen{padding:16px 16px 30px;}
    .kv{grid-template-columns:1fr;gap:0;}
    .kv dt{color:var(--dim);margin-top:8px;}
    .rec .when{margin-left:0;width:100%;}
    .chrome{display:none;}
    .asciiname{font-size:11px;min-height:4.6em;}
    .stats{gap:20px;}
    .stat-b .n{font-size:22px;}
    .tipbox{padding:12px 14px;}
    .setgrid{grid-template-columns:1fr;gap:12px;}
    .opt{padding:9px 16px;margin:0 8px 10px 0;}

    /* MOBILE TERMINAL INPUT ADJUSTMENTS */
    .inputbar { padding: 0 10px; }
    @supports (padding: env(safe-area-inset-bottom)){
      .inputbar{padding-bottom:env(safe-area-inset-bottom);}
    }
    .inputbar input { font-size: 16px; padding: 14px 0; } /* 16px avoids iOS auto-zoom */
    .inputbar .host { display: none; } /* Shortens prompt to :~$ */
    .inputbar .ps1 { padding-right: 8px; }
    .inputbar .enter { font-size: 11px; padding-left: 8px; }
    #cursor-measurer { font-size: 16px; }
    .suggest { left: 10px; right: 10px; padding: 8px 0; }
    .suggest .s { font-size: 13px; padding: 8px 12px; }

    .tree{grid-template-columns:1fr;gap:0;}
    .ptable{grid-template-columns:2.5em minmax(9em,11em) 1fr 6em;gap:0 10px;font-size:13px;}
    .statusbar{font-size:11px;padding:8px 12px;}
    @supports (padding: env(safe-area-inset-bottom)){
      .statusbar{padding-bottom:calc(8px + env(safe-area-inset-bottom));}
    }
    .statusbar .memdetail,.statusbar .netseg{display:none;}
    .statusbar .div{padding:0 10px;}
  }
  @media (prefers-reduced-motion:reduce){
    .reveal .ln{animation:none;opacity:1;transform:none;}
    .blink{animation:none;}
    *{scroll-behavior:auto;}
  }
</style>
</head>
<body>
<div class="os">

  <div class="chrome">
    <span class="path"><b>arkadeepta</b>@os:~/portfolio$</span>
    <span class="stat">session <span id="sesscount">00</span> &middot; bash</span>
  </div>

  <div class="split">
    <nav class="guide" aria-label="command guide">
      <h2>Commands</h2>
      <ul class="cmdlist" id="cmdlist"></ul>
      <div class="foot">
        Type command or click.<br/>
        <b>TAB</b> auto-completes.
      </div>
    </nav>
    <main class="screen" id="screen" aria-live="polite" tabindex="-1"></main>
  </div>

  <div class="inputbar">
    <div class="suggest" id="suggest"></div>
    <span class="ps1"><span class="host"><span class="u">visitor</span>@arka-os</span>:~$</span>
    <form id="cmdform" autocomplete="off">
      <div class="input-wrapper">
        <input id="cmdinput" type="text" spellcheck="false" aria-label="terminal command input"
          placeholder="type a command, e.g. \about (press Enter)" />
        <span id="block-cursor"></span>
        <span id="cursor-measurer" aria-hidden="true"></span>
      </div>
    </form>
    <button class="enter" id="runbtn" aria-label="run command">Return &crarr;</button>
  </div>

  <div class="statusbar" aria-hidden="true">
    <span class="seg"><span class="k">CPU</span><span class="v">2.3%</span></span>
    <span class="div">|</span>
    <span class="seg"><span class="k">MEM</span><span class="v">28%</span><span class="memdetail" style="color:var(--dimmer)">(1.1G/3.8G)</span></span>
    <span class="div netseg">|</span>
    <span class="seg netseg"><span class="k">NET</span><span class="v">TX:18KB/s RX:32KB/s</span></span>
    <span class="div">|</span>
    <span class="seg"><span class="k">THEME</span><span class="v" id="themestat">green</span></span>
    <span class="seg push"><span class="k">SYS</span><span class="v" id="clock">--</span></span>
  </div>

</div>

<script>
"use strict";

const NAME_ASCII =
`  __ _ _ __| | ____ _   ___  ___
 / _\` | '__| |/ / _\` | / _ \\/ __|
| (_| | |  |   < (_| || (_) \\__ \\

function loadPrefs(){
  try{
    const p = JSON.parse(localStorage.getItem("arka_prefs"));
    const merged = Object.assign({}, DEFAULT_PREFS, p || {});
    if(!THEMES[merged.theme]) merged.theme = DEFAULT_PREFS.theme;
    return merged;
  }catch(e){ return Object.assign({}, DEFAULT_PREFS); }
}
function savePrefs(){
  try{ localStorage.setItem("arka_prefs", JSON.stringify(PREFS)); }catch(e){}
}
let PREFS = loadPrefs();

function applyPrefs(){
  const root = document.documentElement;
  root.dataset.theme = PREFS.theme;
  root.dataset.crt = PREFS.crt;
  root.dataset.motion = PREFS.motion;
  root.dataset.font = PREFS.font;
  const meta = document.getElementById("metatheme");
  if(meta) meta.setAttribute("content", THEMES[PREFS.theme].bg);
  const stat = document.getElementById("themestat");
  if(stat) stat.textContent = PREFS.theme;
}
applyPrefs();

const TAGLINES = [
  "owns learning products end to end",
  "designs curriculum that survives real classrooms",

];
let typeToken = 0;

function startTypeline(){
  const el = document.getElementById("typeline");
  if(!el) return;
  const myToken = ++typeToken;
  if(reducedMotion()){ el.textContent = TAGLINES[0]; return; }
  let pi = 0, ci = 0, deleting = false;
  (function tick(){
    if(myToken !== typeToken || !document.body.contains(el)) return;
    const p = TAGLINES[pi];
    if(!deleting){
      ci++;
      el.textContent = p.slice(0, ci);
      if(ci === p.length){ deleting = true; setTimeout(tick, 2100); return; }
      setTimeout(tick, 42 + Math.random()*30);
    } else {
      ci--;
      el.textContent = p.slice(0, ci);
      if(ci === 0){ deleting = false; pi = (pi+1) % TAGLINES.length; setTimeout(tick, 350); return; }
      setTimeout(tick, 20);
    }
  })();
}

function paint(typedCmd, html, activeKey){
  const echo = `<div class="echo"><span class="p">visitor@arka-os:~$</span> <span class="c">${typedCmd}</span></div>`;
  screen.innerHTML = echo + `<div id="body">${html}</div>`;
  const body = screen.querySelector("#body");
  body.insertAdjacentHTML("beforeend",
    `<div class="ln endcap"><span class="p">visitor@arka-os:~$</span> <span class="blink">&#9608;</span></div>`);
  if(!reducedMotion()){
    body.classList.add("reveal");
    body.querySelectorAll(".ln").forEach((el,i)=>{ el.style.animationDelay = Math.min(i*30, 400)+"ms"; });
  }
  setActive(activeKey || null);
  screen.scrollTop = 0;

  // Initialize Stats Animation with IntersectionObserver
  animateStats(body);

  // Typed tagline (home only)
  if(body.querySelector("#typeline")) startTypeline();

  // Initialize Matrix Rain Decryption Effect
  const asciiEl = body.querySelector('.asciiname');
  if (asciiEl && !reducedMotion()) {
    const originalLines = NAME_ASCII.split('\n');
    const rows = originalLines.length;
    const cols = Math.max(...originalLines.map(l => l.length));

    // Cyberpunk/Terminal charset for the glitch frames
    const charset = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*+=-/\\|<>[]";
    const esc = (c) => c === '<' ? '&lt;' : c === '>' ? '&gt;' : c;

    const colsData = [];
    for (let c = 0; c < cols; c++) {
      colsData.push({
        y: -Math.random() * 12 - 1, // Start randomly above grid
        speed: Math.random() * 0.4 + 0.15, // Falling speed
        length: Math.random() * 4 + 2 // Trail length
      });
    }

    let allDone = false;

    (function matrixStep() {
      let currentHTML = "";
      allDone = true;

      for (let r = 0; r < rows; r++) {
        let rowHTML = "";
        for (let c = 0; c < cols; c++) {
          const targetChar = originalLines[r][c] || ' ';
          const colData = colsData[c];

          if (colData.y - colData.length > r) {
            // Droplet has passed, lock in target character
            rowHTML += esc(targetChar);
          } else if (Math.floor(colData.y) === r) {
            // Droplet head (bright)
            const randChar = charset[Math.floor(Math.random() * charset.length)];
            rowHTML += `<span style="color:var(--white);text-shadow:0 0 4px var(--green)">${esc(randChar)}</span>`;
            allDone = false;
          } else if (r < colData.y && r > colData.y - colData.length) {
            // Droplet tail (fading)
            const randChar = charset[Math.floor(Math.random() * charset.length)];
            const opacity = 1 - (colData.y - r) / colData.length;
            rowHTML += `<span style="opacity:${opacity}">${esc(randChar)}</span>`;
            allDone = false;
          } else {
            // Not reached yet
            rowHTML += ' ';
            allDone = false;
          }
        }
        currentHTML += rowHTML + (r < rows - 1 ? '\n' : '');
      }

      for (let c = 0; c < cols; c++) {
        colsData[c].y += colsData[c].speed;
      }

      asciiEl.innerHTML = currentHTML;

      if (!allDone && document.body.contains(asciiEl)) {
        // ~30fps refresh
        setTimeout(() => window.requestAnimationFrame(matrixStep), 35);
      } else {
        // Snap to perfect original text just to be safe
        asciiEl.textContent = NAME_ASCII;
      }
    })();
  }
}

function animateStats(root){
  if (reducedMotion()) return;

  const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;
        const num = parseFloat(el.dataset.num);
        if (isNaN(num)) return;

        const pre = el.dataset.pre || "";
        const suf = el.dataset.suf || "";
        const dur = 2000;
        let start = null;

        function step(timestamp) {
          if(!start) start = timestamp;
          const progress = Math.min((timestamp - start) / dur, 1);

          const eased = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
          const currentNum = Math.round(eased * num);
          el.textContent = pre + currentNum.toLocaleString('en-US') + suf;

          if(progress < 1) {
            window.requestAnimationFrame(step);
          } else {
            el.textContent = pre + num.toLocaleString('en-US') + suf;
          }
        }

        window.requestAnimationFrame(step);
        obs.unobserve(el);
      }
    });
  }, { root: screen, threshold: 0.1 });

  root.querySelectorAll(".stat-b .n[data-num]").forEach(el => {
    const pre = el.dataset.pre || "";
    const suf = el.dataset.suf || "";
    el.textContent = pre + "0" + suf;
    observer.observe(el);
  });
}

function handleTheme(arg, typed){
  if(arg && THEMES[arg]){
    PREFS.theme = arg; savePrefs(); applyPrefs();
    renderSettings(typed, `theme set: <b>${arg}</b> (${THEMES[arg].note})`);
  } else if(arg){
    paint(typed, errHtml(`unknown theme: <b>${escapeHtml(arg)}</b>. available: ${Object.keys(THEMES).join(", ")}.`), null);
  } else {
    renderSettings(typed, null);
  }
}

function handleFont(arg, typed){
  const map = { small:"small", normal:"normal", default:"normal", medium:"normal", large:"large", big:"large" };
  if(arg && map[arg]){
    PREFS.font = map[arg]; savePrefs(); applyPrefs(); updateCursor();
    renderSettings(typed, `type size: <b>${map[arg]}</b>`);
  } else {
    paint(typed, errHtml(`usage: <b>\\font small|normal|large</b>`), null);
  }
}

function handleSwitch(name, label, arg, typed){
  if(arg === "on" || arg === "off"){
    PREFS[name] = arg;
  } else if(!arg || arg === "toggle"){
    PREFS[name] = PREFS[name] === "on" ? "off" : "on";
  } else {
    paint(typed, errHtml(`usage: <b>\\${name} on|off</b>`), null);
    return;
  }
  savePrefs(); applyPrefs();
  renderSettings(typed, `${label}: <b>${PREFS[name]}</b>`);
}

function resetPrefs(typed){
  PREFS = Object.assign({}, DEFAULT_PREFS);
  savePrefs(); applyPrefs(); updateCursor();
  renderSettings(typed, "defaults restored: green phosphor, crt on, motion on, normal type.");
}

function runCommand(raw){
  const typed = raw.trim();
  if(typed==="") return;
  history.push(typed); histIdx = history.length;
  sessionN++; sessEl.textContent = String(sessionN).padStart(2,"0");

  sessionStorage.setItem("arka_history", JSON.stringify(history));
  sessionStorage.setItem("arka_session", sessionN);

  const esc = escapeHtml(typed);

  // EASTER EGG: sudo rm -rf /
  if(typed.toLowerCase() === "sudo rm -rf /" || typed.toLowerCase() === "\\sudo rm -rf /") {
    paint(esc, `<div class="ln err" style="font-weight:bold; font-size:16px;">PERMISSION DENIED: This incident will be reported.</div>`, null);
    afterRun(); return;
  }

  const parsedCmd = typed.replace(/^[\\/]+/,"").toLowerCase();

  // EASTER EGG: whoami
  if(parsedCmd === "whoami") {
    paint(esc, `<div class="ln lead">You are a <span class="c2">visitor</span>, but I am <b>Arkadeepta</b>.</div><div class="ln note">Type <span class="cmdlink" data-cmd="about">\\about</span> for the real profile.</div>`, null);
    afterRun(); return;
  }

  const parts = parsedCmd.split(/\s+/);
  let key = parts[0]; const arg = parts[1];

  // EASTER EGG / AUTHENTIC TERMINAL BEHAVIOUR: Complete DOM Wipe
  if(key==="clear"||key==="cls"){
    screen.innerHTML = "";
    setActive(null);
    afterRun();
    return;
  }

  if(key==="ls"||key==="dir"){ listSections(esc); afterRun(); return; }
  if(key==="tree"){ renderSection("systems", esc); afterRun(); return; }
  if(key==="status"){ renderStatus(esc); afterRun(); return; }

  // viewer customisation commands
  if(key==="theme"){ handleTheme(arg, esc); afterRun(); return; }
  if(key==="font"){ handleFont(arg, esc); afterRun(); return; }
  if(key==="crt"){ handleSwitch("crt", "scanlines", arg, esc); afterRun(); return; }
  if(key==="motion"){ handleSwitch("motion", "motion", arg, esc); afterRun(); return; }
  if(key==="reset"){ resetPrefs(esc); afterRun(); return; }

  if(key==="open"||key==="inspect"){
    if(arg && /^\d+$/.test(arg)){ openProject(arg.padStart(2,"0"), esc); afterRun(); return; }
    if(arg && DOMAIN[arg]){ renderSection(DOMAIN[arg], esc); afterRun(); return; }
    paint(esc, errHtml(`usage: <b>\\${key} &lt;id&gt;</b> (e.g. \\open 01) or a domain like <b>curriculum</b>, <b>ai</b>.`), null);
    afterRun(); return;
  }
  if(ALIASES[key]) key = ALIASES[key];
  if(!sections[key]){
    const pref = CMDS.filter(k=>k.startsWith(key));
    if(pref.length===1) key = pref[0];
  }
  if(sections[key]) renderSection(key, esc);
  else paint(esc, errHtml(`command not found: <b>${escapeHtml(parts[0])||"(empty)"}</b>`), null);
  afterRun();
}
function afterRun(){ input.value=""; suggest.innerHTML=""; updateCursor(); if(window.innerWidth>760) input.focus(); }
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

form.addEventListener("submit", e=>{ e.preventDefault(); runCommand(input.value); });
runbtn.addEventListener("click", ()=>runCommand(input.value));

/* Block Cursor Calculation */
function updateCursor() {
  if (!input || !blockCursor || !cursorMeasurer) return;
  // Replace spaces with non-breaking spaces so trailing spaces measure correctly
  cursorMeasurer.textContent = input.value.substring(0, input.selectionStart).replace(/ /g, "\u00a0");
  blockCursor.style.transform = `translate(${cursorMeasurer.offsetWidth}px, -50%)`;
}

// Bind cursor updates
["input", "keyup", "click", "focus", "blur"].forEach(evt => {
  input.addEventListener(evt, updateCursor);
});

let tabIndex = 0;
let tabBase = "";

input.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp"){ e.preventDefault(); if(history.length){ histIdx=Math.max(0,histIdx-1); input.value=history[histIdx]||""; caretEnd(); updateSuggest(); updateCursor(); } }
  else if(e.key==="ArrowDown"){ e.preventDefault(); if(history.length){ histIdx=Math.min(history.length,histIdx+1); input.value=history[histIdx]||""; caretEnd(); updateSuggest(); updateCursor(); } }
  else if(e.key==="Tab"){
    e.preventDefault();
    if(tabIndex === 0) {
        tabBase = input.value.replace(/^[\\/]+/,"").toLowerCase();
    }
    const hits = CMDS.concat(UTIL_CMDS).filter(k=>k.startsWith(tabBase)&&tabBase.length);
    if(hits.length > 0){
        input.value = "\\" + hits[tabIndex % hits.length];
        tabIndex++;
        updateSuggest();
        updateCursor();
    }
  }
  else if(e.key==="Escape"){ suggest.innerHTML=""; tabIndex = 0; }
  else {
      // Reset tab index on other key presses
      if(e.key !== "Shift" && e.key !== "Control" && e.key !== "Alt" && e.key !== "Meta") {
          tabIndex = 0;
      }
  }
  // Allow cursor to update on left/right arrow navigation
  setTimeout(updateCursor, 0);
});

input.addEventListener("input", updateSuggest);
suggest.addEventListener("mousedown", e=>{ e.preventDefault(); const b=e.target.closest(".s"); if(b) runCommand("\\"+b.dataset.key); });

function updateSuggest(){
  const frag = input.value.replace(/^[\\/]+/,"").toLowerCase().trim();
  if(!frag){ suggest.innerHTML=""; return; }
  const pool = CMDS.concat(["theme","crt","motion","font","reset"]);
  const starts = pool.filter(k=>k.startsWith(frag));
  const contains = pool.filter(k=>!k.startsWith(frag) && k.includes(frag));
  const list = starts.concat(contains).slice(0,8);
  if(!list.length){ suggest.innerHTML=""; return; }
  suggest.innerHTML = list.map(k=>{
    const i=k.indexOf(frag);
    const disp = i>=0
      ? escapeHtml(k.slice(0,i))+'<span class="m">'+escapeHtml(k.slice(i,i+frag.length))+'</span>'+escapeHtml(k.slice(i+frag.length))
      : escapeHtml(k);
    const hint = sections[k] ? sections[k].hint : "customise";
    return `<button type="button" class="s" data-key="${k}"><span style="color:var(--dim)">\\</span>${disp}<span class="h">${hint}</span></button>`;
  }).join("");
}
function caretEnd(){ requestAnimationFrame(()=>input.setSelectionRange(input.value.length,input.value.length)); }

/* clickable in-content commands (links, settings options, and hero shortcuts) */
screen.addEventListener("click", e=>{
  const l = e.target.closest("[data-cmd]");
  if(l && l.dataset.cmd){ e.preventDefault(); runCommand(l.dataset.cmd); }
});
screen.addEventListener("keydown", e=>{
  if(e.key!=="Enter" && e.key!==" ") return;
  const l = e.target.closest("[data-cmd][role='button']");
  if(l && l.dataset.cmd){ e.preventDefault(); runCommand(l.dataset.cmd); }
});

/* INPUT FOCUS PERSISTENCE */
document.querySelector(".os").addEventListener("mouseup", e => {
  // Ignore clicks on buttons, links, or the input itself
  if(e.target.closest("a, button, input, .cmd, .cmdlink, .opt, .s")) return;

  // Only refocus input on Desktop, and ONLY if the user is NOT highlighting text
  if(window.innerWidth > 760 && window.getSelection().toString().length === 0){
    setTimeout(()=>input.focus(), 0);
  }
});

/* live clock in the status bar */
function tick(){
  const el = document.getElementById("clock");
  if(!el) return;
  const d = new Date(), p = n => String(n).padStart(2,"0");
  el.textContent = `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
tick(); setInterval(tick, 1000);

/* ---- boot ---- */
function boot(){
  const lines = [
    `<span class="warn">arka-os</span> v3.0 - bash terminal emulator`,
    `[ <span class="ok">ok</span> ] mounting /curriculum ................. ready`,
    `[ <span class="ok">ok</span> ] loading /ai-workflows ................ 6 tools`,
    `[ <span class="ok">ok</span> ] verifying qc-gates ................... <span class="ok">pass</span>`,
    `[ <span class="ok">ok</span> ] loading display themes ............... 5 found (<span class="ok">\\theme</span>)`,
    `[ <span class="ok">ok</span> ] restoring viewer prefs ............... ${PREFS.theme} / crt ${PREFS.crt}`,
    `[ <span class="ok">ok</span> ] operator: Arkadeepta Roy`,
    `&nbsp;`,
    `Type <span class="ok">\\help</span> for the manual, or <span class="ok">\\settings</span> to make this terminal yours. Booting \\home &hellip;`
  ];
  sessEl.textContent = String(sessionN).padStart(2,"0");
  if(reducedMotion()){ screen.innerHTML = `<div class="boot">${lines.join("<br/>")}</div>`; setTimeout(()=>renderSection("home"),250); return; }
  screen.innerHTML = `<div class="boot" id="bootbox"></div>`;
  const box = document.getElementById("bootbox");
  let i=0;
  (function step(){
    if(i<lines.length){ box.innerHTML += lines[i] + "<br/>"; i++; setTimeout(step, 100 + Math.random()*80); }
    else setTimeout(()=>renderSection("home"), 400);
  })();
}
window.addEventListener("load", ()=>{ boot(); if(window.innerWidth>760) input.focus(); });
</script>
